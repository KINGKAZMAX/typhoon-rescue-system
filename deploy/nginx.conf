# 广西台风救援平台 · Nginx 静态部署（适配阿里云轻量应用服务器 2核2G）
#
# 这个站是纯静态 PWA，Nginx 直接发文件即可，几百人乃至更高并发都很轻松。
# 大流量时瓶颈是「带宽」，解决办法是前面挂一层 CDN（阿里云 CDN/DCDN），而不是换服务器。
#
# 部署步骤：
#   1) 构建产物：npm run build  →  得到 dist/（也可从 GitHub Actions 的 dist Artifact 下载）
#   2) 上传到服务器：  scp -r dist/*  root@你的IP:/var/www/typhoon/
#   3) 放置本配置：    /etc/nginx/conf.d/typhoon.conf   （改好 server_name 与 root）
#   4) 生效：          nginx -t && systemctl reload nginx
#   5) HTTPS：         certbot --nginx -d 你的域名     （备案域名 + 443 是大陆正式对外前提）

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;          # ← 改成你的域名；先用 IP 测试可写 _

    root /var/www/typhoon;                # ← dist/ 里的文件上传到这里
    index index.html;

    # gzip 压缩（JS/CSS 体积再降一半左右，省带宽）
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # 带内容 hash 的静态资源：长期强缓存（文件名变了才会更新，绝对安全）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PWA 与入口文件：不缓存，保证发新版后用户立即拿到最新
    location = /index.html           { add_header Cache-Control "no-cache"; }
    location = /sw.js                { add_header Cache-Control "no-cache"; }
    location = /registerSW.js        { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

    # 单页应用兜底：找不到的路径回落到 index.html
    # （本项目用 HashRouter，理论上不需要，这里兜底更稳、也兼容将来切 BrowserRouter）
    location / {
        try_files $uri $uri/ /index.html;
        # 基本安全响应头（放在此 location，index.html 经内部回落也会带上）
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
